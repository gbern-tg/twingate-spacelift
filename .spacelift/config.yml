version: "2"

stack_defaults:
  # Your custom runner image from Step 1
  runner_image: gberntg/spacelift-twingate:latest

  before_init:
    # Write the service key from an env var to the file location Twingate expects
    - |
      mkdir -p /etc/twingate
      echo "$TWINGATE_SERVICE_KEY" > /etc/twingate/service_key.json
      echo ">>> Service key written"

    # Start the Twingate client in userspace HTTP proxy mode (background)
    - |
      echo ">>> Starting Twingate client (userspace mode, port 9999)..."
      twingated --http-proxy 0.0.0.0:9999 --tun off &
      sleep 10
      echo ">>> Twingate client started"

    # Start proxytunnel to bridge TCP 5432 through the HTTP proxy (background)
    - |
      echo ">>> Starting proxytunnel: localhost:5432 → 127.0.0.1:9999 → $DB_DEST"
      proxytunnel --standalone=5432 --proxy=127.0.0.1:9999 --dest=$DB_DEST &
      sleep 3
      echo ">>> proxytunnel started"

    # Quick sanity check
    - |
      echo ">>> Checking if tunnel is up..."
      pg_isready -h 127.0.0.1 -p 5432 && echo ">>> Tunnel is ready!" || echo ">>> Tunnel not ready yet (may need more time)"
